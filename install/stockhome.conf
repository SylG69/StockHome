<VirtualHost *:80>
    ServerName stockhome.domolinux.eu
    # Rediriger HTTP → HTTPS (recommandé)
    Redirect permanent / https://stockhome.domolinux.eu/
RewriteEngine on
RewriteCond %{SERVER_NAME} =stockhome.domolinux.eu
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName stockhome.domolinux.eu


    # Frontend React (fichiers statiques)
    DocumentRoot /var/www/stockhome
    <Directory /var/www/stockhome>
        Options -Indexes
        AllowOverride All
        Require all granted

        # Indispensable pour React Router (SPA)
        FallbackResource /index.html
    </Directory>

    # Proxy vers FastAPI pour toutes les routes /api/
    ProxyPreserveHost On
    ProxyPass        /api/ http://127.0.0.1:8001/api/
    ProxyPassReverse /api/ http://127.0.0.1:8001/api/

    # Headers CORS gérés par FastAPI, pas Apache
    # Ne pas doubler ici

    ErrorLog  ${APACHE_LOG_DIR}/stockhome_error.log
    CustomLog ${APACHE_LOG_DIR}/stockhome_access.log combined
SSLCertificateFile /etc/letsencrypt/live/stockhome.domolinux.eu/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/stockhome.domolinux.eu/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>