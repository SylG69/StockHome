services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockhome}
      POSTGRES_USER: ${POSTGRES_USER:-stockhome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?définissez POSTGRES_PASSWORD dans .env}
    volumes:
      - stockhome_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockhome}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-stockhome}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stockhome}
      JWT_SECRET: ${JWT_SECRET:?définissez JWT_SECRET dans .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "${APP_PORT:-8000}:8000"

volumes:
  stockhome_db_data:
