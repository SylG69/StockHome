name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]

# Autorise la pipeline à écrire dans le Container Registry de GitHub
permissions:
  packages: write
  contents: write
  deployments: write

jobs:
  # ----------------------------------------------------
  # STAGE 1 : Code Quality (Linters en parallèle)
  # ----------------------------------------------------
  pylint:
    name: Run Pylint Code Quality
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
    - name: Analysing the code with pylint
      run: |
        pylint --fail-under=9.0 --rcfile=.pylintrc $(git ls-files '*.py')

  eslint:
    name: Run eslint Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies (Frontend)
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps

      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        working-directory: ./frontend
        run: |
          npx eslint . \
            --format @microsoft/eslint-formatter-sarif \
            --output-file ./eslint-results.sarif
        continue-on-error: true

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ./frontend/eslint-results.sarif
          wait-for-processing: true

  # ----------------------------------------------------
  # STAGE 2 : Validation (Tests / Build)
  # ----------------------------------------------------
  ci-testing:
    name: Integration & Tests
    runs-on: ubuntu-latest
    needs: [pylint, eslint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend tests
        working-directory: ./backend
        run: pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test

  # ----------------------------------------------------
  # STAGE 3 : DÉTERMINATION DE LA VERSION
  # ----------------------------------------------------
  # Calcule le tag une seule fois pour toute la pipeline : consommé à la fois
  # par build-and-push (build-args de l'image Docker) et par update_release
  # (création du tag Git + de la release), qui recalculaient auparavant
  # chacun leur propre valeur de façon redondante (et potentiellement
  # incohérente si l'historique des tags changeait entre les deux).
  determine-version:
    name: Determine App Version
    runs-on: ubuntu-latest
    needs: [pylint, eslint, ci-testing]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      app_env: ${{ steps.version.outputs.app_env }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine app version
        id: version
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            LATEST_TAG=$(git tag --list --sort=-v:refname | grep -E '^[v]?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
            if [ -z "$LATEST_TAG" ]; then
              PREFIX=""; MAJ=0; MIN=0; PATCH=0
            else
              if [[ "$LATEST_TAG" =~ ^v ]]; then
                PREFIX="v"; VERSION="${LATEST_TAG#v}"
              else
                PREFIX=""; VERSION="$LATEST_TAG"
              fi
              IFS='.' read -r MAJ MIN PATCH <<< "$VERSION"
            fi
            PATCH=$((PATCH + 1))
            echo "app_version=${PREFIX}${MAJ}.${MIN}.${PATCH}" >> "$GITHUB_OUTPUT"
            echo "app_env=production" >> "$GITHUB_OUTPUT"
            echo "previous_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "app_version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "app_env=staging" >> "$GITHUB_OUTPUT"
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------
  # STAGE 4 : BUILD & PUSH DOCKER IMAGE
  # ----------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [pylint, eslint, ci-testing, determine-version]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion au registre d'images GitHub (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Configuration du builder Docker (gère le cache pour accélérer les builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extraction des métadonnées (tags, labels)
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      # Build et Push automatique
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.determine-version.outputs.app_version }}
            APP_ENV=${{ needs.determine-version.outputs.app_env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------
  # STAGE 5 : DEPLOY
  # ----------------------------------------------------
  deploy-staging:
    name: Deploy to Staging (develop)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Trigger Deploy Webhook (staging)
        run: |
          curl -f -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"

  deploy-production:
    name: Deploy to Production (main)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger Deploy Webhook (production)
        run: |
          curl -f -X POST "${{ secrets.DEPLOY_WEBHOOK_URL_PROD }}"

  deploy-test:
   name: Execute remote deploy script via SSH
   needs: [pylint, eslint, ci-testing]
   runs-on: ubuntu-latest
   if: startsWith(github.ref, 'refs/heads/feature/') && github.actor == 'SylG69'
   environment: test
   steps:
   - name: Connect and deploy
     uses: appleboy/ssh-action@v1.0.3
     with:
       host: ${{ secrets.SSH_HOST }}
       username: ${{ secrets.SSH_USER }}
       key: ${{ secrets.SSH_KEY }}
       port: 22
       script: |
         echo "Connexion SSH réussie. Déclenchement du script de déploiement..."
         sudo /appli/stockhome/deploy.sh "${{ github.ref_name }}"

  # -------------------------------------------------------
  # STAGE 6 : MAJ RELEASE (après déploiement en production)
  # -------------------------------------------------------

  update_release:
    needs: [deploy-production, determine-version]
    runs-on: ubuntu-latest
    # Accorde explicitement les droits d'écriture pour pousser le tag et créer la release
    permissions:
      contents: write
    steps:
      - name: Checkout (full history & tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push tag and create release with changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          # Tag déjà calculé une seule fois par le job determine-version --
          # on ne relit plus l'historique des tags ici, juste besoin de
          # LATEST_TAG (le tag précédent) pour générer le changelog.
          NEW_TAG: ${{ needs.determine-version.outputs.app_version }}
          LATEST_TAG: ${{ needs.determine-version.outputs.previous_tag }}
        run: |
          set -euo pipefail

          echo "New tag: $NEW_TAG (previous: '${LATEST_TAG:-<none>}')"

          # --- generate changelog: commits since latest tag (or full history if none)
          if [ -n "$LATEST_TAG" ]; then
            CHANGELOG=$(git log --no-merges --pretty=format:'- %h %s (%an)' "${LATEST_TAG}..HEAD" || true)
            RANGE="${LATEST_TAG}..HEAD"
          else
            CHANGELOG=$(git log --no-merges --pretty=format:'- %h %s (%an)' HEAD -n 100 || true)
            RANGE="initial..HEAD"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- (no commits found since ${LATEST_TAG:-start})"
          fi

          echo "Changelog (excerpt):"
          echo "$CHANGELOG" | sed -n '1,20p'

          # --- configure git user for tag push
          git config user.name "${ACTOR}"
          git config user.email "${ACTOR}@users.noreply.github.com"

          # --- create annotated tag and push
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG} (automatique)"
          echo "Pushing tag ${NEW_TAG} to origin..."
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git"
          git push "${REPO_URL}" "${NEW_TAG}"

          # --- prepare release body
          RELEASE_BODY="Automated release ${NEW_TAG}

          Changes (${RANGE}):
          ${CHANGELOG}

          Commit: ${TARGET_SHA}
          Deployed by: ${ACTOR}
          Workflow: ${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER}"

          # Export pour que RELEASE_BODY soit visible par Python (NEW_TAG
          # est déjà exportée automatiquement via le "env:" du step).
          export RELEASE_BODY

          JSON_PAYLOAD=$(python3 - <<PY
          import os, json
          payload = {
            "tag_name": os.environ["NEW_TAG"],
            "name": os.environ["NEW_TAG"],
            "body": os.environ["RELEASE_BODY"],
            "draft": False,
            "prerelease": False,
            "target_commitish": os.environ["TARGET_SHA"]
          }
          print(json.dumps(payload))
          PY
          )

          # /!\ AJOUT : Envoi effectif à l'API GitHub pour créer la Release
          echo "Creating GitHub Release..."
          curl -s -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${REPOSITORY}/releases \
            -d "$JSON_PAYLOAD" > /dev/null

          echo "Release ${NEW_TAG} créée avec succès !"