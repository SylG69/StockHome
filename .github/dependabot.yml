version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Une seule PR groupant TOUTES les mises à jour npm de la semaine,
      # plutôt qu'une PR par paquet -- limite les merges et évite les
      # conflits entre plusieurs PR touchant le même package.json/lock.
      # Inclut de fait eslint + @eslint/js ensemble (paquets couplés : la
      # config "recommended" de @eslint/js embarque des règles du coeur
      # d'ESLint, qui doivent donc toujours avancer de pair -- cf. erreur
      # "no-unassigned-vars" quand l'un des deux est resté en retrait).
      frontend:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      # Idem côté backend : une seule PR groupant toutes les mises à jour
      # pip de la semaine.
      backend:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker:
        patterns:
          - "*"
